<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InvertisEat AI — Invertis University Canteen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #fdf8f3;
      --bg2:      #fff;
      --surface:  #fef4ea;
      --orange:   #e8621a;
      --orange2:  #f5832e;
      --orange-lt:#fff0e6;
      --dark:     #1a1208;
      --dark2:    #2d1f0e;
      --text:     #2d1f0e;
      --text2:    #7a5c3a;
      --text3:    #b89b7a;
      --border:   #edddc8;
      --shadow:   rgba(232,98,26,0.10);
      --font-d:   'DM Serif Display', Georgia, serif;
      --font-s:   'DM Sans', sans-serif;
    }

    html, body, #root {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-s);
      overflow: hidden;
    }

    /* ===== DECORATIVE BG ===== */
    .bg-pattern {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(232,98,26,0.04) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(232,98,26,0.06) 0%, transparent 50%);
    }

    .bg-dots {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(232,98,26,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
    }

    /* ===== LAYOUT ===== */
    .shell {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      background: var(--dark);
      display: flex; flex-direction: column;
      overflow-y: auto;
      position: relative;
    }

    .sidebar-inner {
      padding: 28px 22px;
      display: flex; flex-direction: column;
      gap: 24px; min-height: 100%;
    }

    /* Brand */
    .brand {
      display: flex; flex-direction: column; gap: 6px;
      padding-bottom: 22px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .brand-top {
      display: flex; align-items: center; gap: 12px;
    }

    .brand-logo {
      width: 48px; height: 48px; border-radius: 14px;
      background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 0 3px rgba(232,98,26,0.25), 0 8px 24px rgba(232,98,26,0.35);
      animation: logo-breathe 4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes logo-breathe {
      0%,100% { box-shadow: 0 0 0 3px rgba(232,98,26,0.25), 0 8px 24px rgba(232,98,26,0.35); }
      50%      { box-shadow: 0 0 0 6px rgba(232,98,26,0.15), 0 8px 32px rgba(232,98,26,0.5); }
    }

    .brand-name {
      font-family: var(--font-d);
      font-size: 20px;
      color: #fff;
      line-height: 1.2;
    }

    .brand-name span {
      display: block;
      font-size: 11px;
      font-family: var(--font-s);
      font-weight: 400;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Online badge */
    .online-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: rgba(52,199,89,0.12);
      border: 1px solid rgba(52,199,89,0.25);
      border-radius: 100px;
      font-size: 11px; font-weight: 500;
      color: #5cd679;
      width: fit-content;
    }

    .online-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #5cd679;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Sidebar section */
    .s-section h4 {
      font-size: 10px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 12px;
    }

    /* Menu categories */
    .menu-cats {
      display: flex; flex-direction: column; gap: 4px;
    }

    .cat-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.65);
      font-family: var(--font-s); font-size: 13px;
      text-align: left; width: 100%;
    }

    .cat-btn:hover {
      background: rgba(232,98,26,0.15);
      border-color: rgba(232,98,26,0.3);
      color: #fff;
      transform: translateX(3px);
    }

    .cat-icon { font-size: 16px; }

    /* Quick asks */
    .quick-list {
      display: flex; flex-direction: column; gap: 6px;
    }

    .quick-btn {
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 12px; font-family: var(--font-s);
      cursor: pointer; text-align: left;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: rgba(232,98,26,0.12);
      border-color: rgba(232,98,26,0.25);
      color: rgba(255,255,255,0.85);
    }

    /* Footer credit */
    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }

    .powered-by {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      line-height: 1.7;
      letter-spacing: 0.3px;
    }

    .powered-by strong {
      color: var(--orange2);
      font-weight: 600;
    }

    /* ===== MAIN AREA ===== */
    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--bg);
      overflow: hidden;
    }

    /* Topbar */
    .topbar {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(253,248,243,0.9);
      backdrop-filter: blur(12px);
    }

    .topbar-left h2 {
      font-family: var(--font-d);
      font-size: 20px; color: var(--text);
      line-height: 1;
    }

    .topbar-left p {
      font-size: 12px; color: var(--text3);
      margin-top: 3px;
    }

    .topbar-right {
      display: flex; align-items: center; gap: 10px;
    }

    .univ-badge {
      padding: 6px 14px;
      background: var(--orange-lt);
      border: 1px solid rgba(232,98,26,0.2);
      border-radius: 100px;
      font-size: 12px; font-weight: 500;
      color: var(--orange);
    }

    /* Messages */
    .messages {
      overflow-y: auto; padding: 28px;
      display: flex; flex-direction: column; gap: 18px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome */
    .welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; text-align: center; gap: 18px;
      animation: rise 0.6s ease both;
    }

    @keyframes rise {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .welcome-plate {
      width: 88px; height: 88px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), #ff9d5c);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      box-shadow: 0 16px 48px rgba(232,98,26,0.3), 0 0 0 8px rgba(232,98,26,0.08);
      animation: float-plate 4s ease-in-out infinite;
    }

    @keyframes float-plate {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .welcome h2 {
      font-family: var(--font-d);
      font-size: 30px; color: var(--text);
      line-height: 1.2;
    }

    .welcome h2 em {
      color: var(--orange); font-style: italic;
    }

    .welcome p {
      font-size: 14px; color: var(--text2);
      max-width: 380px; line-height: 1.7;
    }

    .welcome-chips {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    }

    .w-chip {
      padding: 9px 18px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      font-size: 13px; color: var(--text2);
      cursor: pointer; font-family: var(--font-s);
      transition: all 0.2s;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .w-chip:hover {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232,98,26,0.3);
    }

    /* Message bubbles */
    .msg-row {
      display: flex; gap: 12px;
      animation: rise 0.25s ease both;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .av {
      width: 36px; height: 36px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0; margin-top: 2px;
    }

    .av.bot {
      background: var(--orange);
      box-shadow: 0 4px 12px rgba(232,98,26,0.3);
    }

    .av.user {
      background: var(--dark);
    }

    .bubble {
      max-width: 68%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .bubble.bot {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
      box-shadow: 0 4px 16px var(--shadow);
    }

    .bubble.user {
      background: var(--dark);
      border-top-right-radius: 4px;
      color: #fff;
      box-shadow: 0 4px 16px rgba(26,18,8,0.2);
    }

    .bubble-meta {
      font-size: 11px; color: var(--text3);
      margin-top: 5px; display: flex; align-items: center; gap: 8px;
    }

    .msg-row.user .bubble-meta { justify-content: flex-end; }

    /* Typing */
    .typing {
      display: flex; gap: 5px; padding: 2px 0;
    }

    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--orange);
      animation: dot 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%,80%,100% { transform:translateY(0); opacity:0.4; }
      40%          { transform:translateY(-7px); opacity:1; }
    }

    /* ===== INPUT ===== */
    .input-zone {
      padding: 16px 28px 22px;
      border-top: 1.5px solid var(--border);
      background: var(--bg);
    }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 12px 12px 12px 20px;
      box-shadow: 0 4px 20px var(--shadow);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row:focus-within {
      border-color: rgba(232,98,26,0.5);
      box-shadow: 0 0 0 4px rgba(232,98,26,0.08), 0 4px 20px var(--shadow);
    }

    .input-row textarea {
      flex: 1; background: transparent;
      border: none; outline: none;
      color: var(--text); font-family: var(--font-s);
      font-size: 14.5px; resize: none;
      min-height: 22px; max-height: 110px;
      line-height: 1.55;
    }

    .input-row textarea::placeholder { color: var(--text3); }

    .send-btn {
      width: 44px; height: 44px;
      background: var(--orange);
      border: none; border-radius: 12px;
      cursor: pointer; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(232,98,26,0.4);
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.07);
      box-shadow: 0 6px 22px rgba(232,98,26,0.55);
    }

    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-foot {
      display: flex; justify-content: space-between;
      align-items: center; margin-top: 8px;
    }

    .hint { font-size: 11px; color: var(--text3); }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text3); font-size: 11px;
      font-family: var(--font-s);
      padding: 4px 12px; border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
    }

    .clear-btn:hover { border-color: var(--orange); color: var(--orange); }

    /* Divider */
    .divider {
      height: 1px; background: var(--border);
      margin: 4px 0;
    }

    @media (max-width: 768px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .messages { padding: 16px; }
      .input-zone { padding: 12px 16px 18px; }
      .topbar { padding: 12px 16px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useRef, useEffect } = React;

  const API = "https://canteenbot-backend.onrender.com";

  const CATEGORIES = [
    { icon: "🍛", label: "Main Course", msg: "Main course mein kya kya hai aur price batao" },
    { icon: "🫓", label: "Tandoori", msg: "Tandoori items ki list batao prices ke saath" },
    { icon: "🍜", label: "Chinese", msg: "Chinese food kya kya hai canteen mein?" },
    { icon: "🥗", label: "South Indian", msg: "South Indian options kya hain?" },
    { icon: "🍔", label: "Continental", msg: "Continental items batao" },
    { icon: "🥤", label: "Beverages", msg: "Drinks aur beverages kya kya hain prices ke saath?" },
    { icon: "🥟", label: "Indian Snacks", msg: "Indian snacks kya hain?" },
  ];

  const QUICK = [
    "🪙 Rs. 50 se kam kya milega?",
    "💪 Healthy khaana suggest karo",
    "🌶️ Spicy kya hai canteen mein?",
    "📚 Exam time ke liye kya khayein?",
    "🌅 Breakfast mein kya hai?",
  ];

  const CHIPS = [
    "Namaste! Kya khayein aaj?",
    "Sasta aur filling kya hai?",
    "Best dish recommend karo",
    "Canteen mein kya famous hai?",
  ];

  function fmt(iso) {
    return new Date(iso).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  }

  function Typing() {
    return <div className="typing"><span/><span/><span/></div>;
  }

  function Bubble({ msg }) {
    const isUser = msg.role === 'user';
    return (
      <div className={`msg-row ${isUser ? 'user' : 'bot'}`}>
        <div className={`av ${isUser ? 'user' : 'bot'}`}>
          {isUser ? '👤' : '🍽️'}
        </div>
        <div>
          <div className={`bubble ${isUser ? 'user' : 'bot'}`}>
            {msg.content}
          </div>
          <div className="bubble-meta">
            {msg.timestamp && <span>{fmt(msg.timestamp)}</span>}
          </div>
        </div>
      </div>
    );
  }

  function App() {
    const [messages, setMessages]   = useState([]);
    const [input, setInput]         = useState('');
    const [loading, setLoading]     = useState(false);
    const [online, setOnline]       = useState(false);
    const endRef  = useRef(null);
    const taRef   = useRef(null);

    useEffect(() => {
      fetch(`${API}/`).then(r => r.json()).then(() => setOnline(true)).catch(() => setOnline(false));
    }, []);

    useEffect(() => {
      endRef.current?.scrollIntoView({ behavior: 'smooth' });
    }, [messages, loading]);

    useEffect(() => {
      const ta = taRef.current;
      if (ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
    }, [input]);

    const send = async (text) => {
      const msg = (text || input).trim();
      if (!msg || loading) return;
      setMessages(p => [...p, { role:'user', content:msg, timestamp: new Date().toISOString() }]);
      setInput('');
      setLoading(true);
      try {
        const history = messages.slice(-10).map(m => ({
          role: m.role === 'bot' ? 'assistant' : 'user',
          content: m.content
        }));
        const res = await fetch(`${API}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, history })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');
        setMessages(p => [...p, { role:'bot', content: data.reply, timestamp: data.timestamp }]);
      } catch(e) {
        setMessages(p => [...p, {
          role:'bot',
          content:`Server se connect nahi ho pa raha! ⚠️\n\nCheck karo:\n1. python app.py chal raha hai?\n2. http://localhost:5000 open hota hai?`,
          timestamp: new Date().toISOString()
        }]);
      } finally { setLoading(false); }
    };

    const onKey = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    };

    return (
      <>
        <div className="bg-pattern"/>
        <div className="bg-dots"/>

        <div className="shell">
          {/* ===== SIDEBAR ===== */}
          <aside className="sidebar">
            <div className="sidebar-inner">

              {/* Brand */}
              <div className="brand">
                <div className="brand-top">
                  <div className="brand-logo">🍽️</div>
                  <div className="brand-name">
                    InvertisEat
                    <span>Invertis University Canteen AI</span>
                  </div>
                </div>
                <div className="online-badge">
                  <div className="online-dot" style={{background: online ? '#5cd679' : '#ff6b6b'}}/>
                  {online ? 'AI Online & Ready' : 'Connecting...'}
                </div>
              </div>

              {/* Menu Categories */}
              <div className="s-section">
                <h4>Browse Menu</h4>
                <div className="menu-cats">
                  {CATEGORIES.map(c => (
                    <button key={c.label} className="cat-btn" onClick={() => send(c.msg)}>
                      <span className="cat-icon">{c.icon}</span>
                      {c.label}
                    </button>
                  ))}
                </div>
              </div>

              <div className="divider" style={{background:'rgba(255,255,255,0.06)'}}/>

              {/* Quick Questions */}
              <div className="s-section">
                <h4>Quick Ask</h4>
                <div className="quick-list">
                  {QUICK.map(q => (
                    <button key={q} className="quick-btn" onClick={() => send(q)}>{q}</button>
                  ))}
                </div>
              </div>

              {/* Footer */}
              <div className="sidebar-footer">
                <div className="powered-by">
                  Powered by<br/>
                  <strong>Gandhi Tech AI</strong><br/>
                  <span style={{fontSize:9, color:'rgba(255,255,255,0.2)'}}>with Claude AI Technology</span>
                </div>
              </div>

            </div>
          </aside>

          {/* ===== MAIN ===== */}
          <div className="main">

            {/* Topbar */}
            <header className="topbar">
              <div className="topbar-left">
                <h2>Canteen Assistant</h2>
                <p>Ask me anything about today's menu</p>
              </div>
              <div className="topbar-right">
                <div className="univ-badge">🎓 Invertis University</div>
              </div>
            </header>

            {/* Messages */}
            <div className="messages">
              {messages.length === 0 ? (
                <div className="welcome">
                  <div className="welcome-plate">🍽️</div>
                  <h2>Hello, <em>Hungry Student!</em></h2>
                  <p>
                    Main hoon <strong>InvertisEat AI</strong> — Invertis University Canteen ka smart assistant.
                    Kuch bhi pucho — menu, prices, recommendations!
                  </p>
                  <div className="welcome-chips">
                    {CHIPS.map(c => (
                      <button key={c} className="w-chip" onClick={() => send(c)}>{c}</button>
                    ))}
                  </div>
                </div>
              ) : (
                messages.map((m, i) => <Bubble key={i} msg={m}/>)
              )}

              {loading && (
                <div className="msg-row bot">
                  <div className="av bot">🍽️</div>
                  <div className="bubble bot"><Typing/></div>
                </div>
              )}
              <div ref={endRef}/>
            </div>

            {/* Input */}
            <div className="input-zone">
              <div className="input-row">
                <textarea
                  ref={taRef}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={onKey}
                  placeholder="Kuch bhi pucho... jaise 'Rs. 80 mein kya milega?'"
                  rows={1}
                  disabled={loading}
                />
                <button className="send-btn" onClick={() => send()} disabled={loading || !input.trim()}>
                  {loading ? '⏳' : '➤'}
                </button>
              </div>
              <div className="input-foot">
                <span className="hint">Enter → Send &nbsp;·&nbsp; Shift+Enter → New Line</span>
                {messages.length > 0 &&
                  <button className="clear-btn" onClick={() => setMessages([])}>✕ Clear Chat</button>
                }
              </div>
            </div>

          </div>
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
